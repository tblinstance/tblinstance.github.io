name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'src/deployment/frontend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'src/deployment/frontend/package-lock.json'

      - name: Install dependencies
        working-directory: src/deployment/frontend
        run: npm ci

      - name: Build frontend
        working-directory: src/deployment/frontend
        run: npm run build

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Deploy to gh-pages
        run: |
          # Copy dist files to gh-pages directory
          cp -r src/deployment/frontend/dist/* gh-pages/
          
          # Configure git
          cd gh-pages
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Commit and push
          git add .
          git commit -m "Deploy frontend: $(date -u +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push origin gh-pages
